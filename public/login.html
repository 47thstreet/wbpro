<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>WBpro - Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #1c1e21;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #ffffff;
      border: 1px solid #ced0d4;
      border-radius: 12px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1c1e21;
    }
    .login-title .accent { color: #1877f2; }
    .login-sub {
      color: #65676b;
      font-size: 13px;
      margin-bottom: 28px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: #ffffff;
      border: 1px solid #ced0d4;
      border-radius: 8px;
      color: #1c1e21;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.15);
    }
    .input-group input::placeholder {
      color: #8a8d91;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #1877f2;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #166fe5; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      color: #e4405f;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title"><span class="accent">WB</span>pro</div>
    <div class="login-sub">Enter password to continue</div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" autofocus />
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      var errEl = document.getElementById('errorMsg');
      var pw = document.getElementById('passwordInput').value;
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        var data = await res.json();
        if (res.ok && data.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Wrong password';
        }
      } catch (err) {
        errEl.textContent = 'Connection error';
      }
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  </script>
</body>
</html>
