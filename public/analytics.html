<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b141a" />
  <title>WBpro - Campaign Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
    :root {
      --bg: #0b141a;
      --surface: #1f2c34;
      --surface-2: #2a3942;
      --border: #374045;
      --text: #e9edef;
      --text-2: #8696a0;
      --text-3: #667781;
      --accent: #25d366;
      --accent-hover: #1fba59;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --purple: #8b5cf6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 1.35rem; font-weight: 700; }
    .header p { font-size: 0.8rem; color: var(--text-2); margin-top: 0.15rem; }
    .header .back-link {
      font-size: 0.8rem;
      padding: 0.45rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
    }

    /* Period selector */
    .period-selector {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .period-btn {
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .period-btn:hover { border-color: var(--text-3); color: var(--text); }
    .period-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem;
    }
    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 0.4rem;
    }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-sub { font-size: 0.7rem; color: var(--text-2); margin-top: 0.2rem; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 0.75rem;
    }

    /* Chart */
    .chart-container {
      height: 200px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding-top: 1rem;
    }
    .chart-bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .chart-bar-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 1px;
      height: 160px;
      width: 100%;
    }
    .chart-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height 0.3s ease;
    }
    .chart-bar.sent { background: var(--accent); }
    .chart-bar.failed { background: var(--red); }
    .chart-date {
      font-size: 0.55rem;
      color: var(--text-3);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 45px;
      overflow: hidden;
    }

    /* Grid layouts */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th {
      text-align: left;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-2);
    }
    tr:hover td { background: var(--surface-2); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-3);
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Campaign Analytics</h1>
      <p>Broadcast performance and delivery stats</p>
    </div>
    <a href="/" class="back-link">Back to Dashboard</a>
  </div>

  <div class="period-selector">
    <button class="period-btn active" data-period="7d">7 Days</button>
    <button class="period-btn" data-period="30d">30 Days</button>
    <button class="period-btn" data-period="90d">90 Days</button>
  </div>

  <div id="stats-container">
    <div class="loading">Loading analytics...</div>
  </div>

  <script>
    let analyticsData = null;
    let activePeriod = '7d';

    async function loadAnalytics() {
      try {
        const res = await fetch('/api/analytics');
        if (!res.ok) throw new Error('Failed to load');
        analyticsData = await res.json();
        render();
      } catch (err) {
        document.getElementById('stats-container').innerHTML =
          '<div class="loading">Failed to load analytics. <a href="javascript:loadAnalytics()">Retry</a></div>';
      }
    }

    function render() {
      if (!analyticsData) return;
      const d = analyticsData;
      const p = d.periods[activePeriod] || {};
      const o = d.overview;

      const deliveryColor = o.deliveryRate >= 90 ? 'var(--accent)' : o.deliveryRate >= 70 ? 'var(--yellow)' : 'var(--red)';

      // Build chart
      const maxVal = Math.max(...d.dailyVolume.map(v => v.sent + v.failed), 1);
      const chartBars = d.dailyVolume.map(v => {
        const sentH = Math.max((v.sent / maxVal) * 160, v.sent > 0 ? 2 : 0);
        const failH = Math.max((v.failed / maxVal) * 160, v.failed > 0 ? 2 : 0);
        const dateLabel = v.date.slice(5); // MM-DD
        return `<div class="chart-bar-group">
          <div class="chart-bar-wrapper">
            <div class="chart-bar failed" style="height:${failH}px" title="${v.failed} failed"></div>
            <div class="chart-bar sent" style="height:${sentH}px" title="${v.sent} sent"></div>
          </div>
          <div class="chart-date">${dateLabel}</div>
        </div>`;
      }).join('');

      // Recent table
      const recentRows = d.recentBroadcasts.map(b => {
        const date = b.timestamp ? new Date(b.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '--';
        const rate = b.total > 0 ? ((b.sent / b.total) * 100).toFixed(0) : '0';
        return `<tr>
          <td style="color:var(--text);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(b.name)}</td>
          <td>${b.groups}</td>
          <td>${b.sent}</td>
          <td>${b.failed}</td>
          <td><span style="color:${rate >= 90 ? 'var(--accent)' : rate >= 70 ? 'var(--yellow)' : 'var(--red)'}">${rate}%</span></td>
          <td>${date}</td>
        </tr>`;
      }).join('');

      // Top groups table
      const groupRows = d.topGroups.map((g, i) => `<tr>
        <td style="color:var(--text);font-weight:500">#${i + 1}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(g.groupId)}">${escapeHtml(g.groupId.replace(/@g\.us$/, ''))}</td>
        <td>${g.broadcastCount}</td>
      </tr>`).join('');

      document.getElementById('stats-container').innerHTML = `
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Broadcasts</div>
            <div class="stat-value">${p.broadcasts || 0}</div>
            <div class="stat-sub">${activePeriod} period</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Messages Sent</div>
            <div class="stat-value">${(p.messagesSent || 0).toLocaleString()}</div>
            <div class="stat-sub">${activePeriod} period</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Failed</div>
            <div class="stat-value" style="color:var(--red)">${(p.messagesFailed || 0).toLocaleString()}</div>
            <div class="stat-sub">${activePeriod} period</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Delivery Rate</div>
            <div class="stat-value" style="color:${deliveryColor}">${o.deliveryRate}%</div>
            <div class="stat-sub">All time</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Unique Groups</div>
            <div class="stat-value">${p.uniqueGroups || 0}</div>
            <div class="stat-sub">${activePeriod} period</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Contacts</div>
            <div class="stat-value">${o.totalContacts.toLocaleString()}</div>
            <div class="stat-sub">In CRM</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Daily Message Volume (14 Days)</div>
          <div class="chart-container">${chartBars}</div>
          <div style="display:flex;gap:1rem;margin-top:0.75rem;font-size:0.65rem;color:var(--text-3)">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent);margin-right:4px"></span>Sent</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--red);margin-right:4px"></span>Failed</span>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-title">Recent Broadcasts</div>
            <div style="overflow-x:auto">
              <table>
                <thead><tr><th>Name</th><th>Groups</th><th>Sent</th><th>Failed</th><th>Rate</th><th>Date</th></tr></thead>
                <tbody>${recentRows || '<tr><td colspan="6" style="text-align:center;color:var(--text-3)">No broadcasts yet</td></tr>'}</tbody>
              </table>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Top Groups by Broadcast Count</div>
            <div style="overflow-x:auto">
              <table>
                <thead><tr><th>#</th><th>Group</th><th>Broadcasts</th></tr></thead>
                <tbody>${groupRows || '<tr><td colspan="3" style="text-align:center;color:var(--text-3)">No data yet</td></tr>'}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // Period selector
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activePeriod = btn.dataset.period;
        render();
      });
    });

    loadAnalytics();
    // Auto-refresh every 60 seconds
    setInterval(loadAnalytics, 60000);
  </script>
</body>
</html>
